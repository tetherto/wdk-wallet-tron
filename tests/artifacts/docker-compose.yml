services:
  tron-node:
    image: tronprotocol/java-tron:latest
    ports:
      - '8090:8090'
      - '8091:8091'
      - '50051:50051'
    deploy:
      resources:
        limits:
          memory: 4g
    volumes:
      - ./conf:/java-tron/conf
    command: >
      -jvm "{-Xmx4g -Xmn1g}"
      -c /java-tron/conf/private_net_config.conf
      -w
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf -X POST http://localhost:8090/wallet/getnowblock -H "Content-Type: application/json" -d "{}" || exit 1']
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
